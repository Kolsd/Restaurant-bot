<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestaurantBot — Acceso</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px; }
  .logo { width: 44px; height: 44px; background: #1D9E75; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 18px; margin-bottom: 1.5rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #111; }
  .sub { font-size: 14px; color: #777; margin-bottom: 1.5rem; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 1rem; }
  input:focus { border-color: #1D9E75; }
  button { width: 100%; padding: 11px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
  button:hover { background: #179063; }
  .error { font-size: 13px; color: #c0392b; background: #fdf0ef; border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; display: none; }
  .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">RB</div>
  <h1>Bienvenido</h1>
  <p class="sub">Ingresa a tu panel de control</p>
  <div class="error" id="error-msg">Usuario o contraseña incorrectos</div>
  <label>Usuario</label>
  <input type="text" id="username" placeholder="restaurante@email.com" />
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
  <button onclick="login()">Ingresar</button>
  <div class="footer">RestaurantBot v2.0 · Powered by Claude AI</div>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorEl = document.getElementById('error-msg');
  errorEl.style.display = 'none';

  if (!username || !password) {
    errorEl.textContent = 'Por favor completa todos los campos';
    errorEl.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('rb_token', data.token);
      localStorage.setItem('rb_restaurant', JSON.stringify(data.restaurant));
      window.location.href = '/dashboard';
    } else {
      errorEl.textContent = data.error || 'Credenciales incorrectas';
      errorEl.style.display = 'block';
    }
  } catch(e) {
    errorEl.textContent = 'Error de conexión. Intenta de nuevo.';
    errorEl.style.display = 'block';
  }
}
</script>
</body>
</html>
