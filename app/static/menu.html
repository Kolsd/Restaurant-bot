<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menú del Restaurante</title>
<style>
  :root { --primary: #1D9E75; --bg: #f5f5f0; --text: #111; --text-muted: #666; }
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  
  .header { background: #fff; padding: 1.5rem 1rem; text-align: center; border-bottom: 1px solid #e0e0d8; position: sticky; top: 0; z-index: 10; }
  .header h1 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #111; }
  .header p { margin: 4px 0 0; font-size: 0.85rem; color: var(--text-muted); }
  
  .menu-container { padding: 1rem; max-width: 600px; margin: 0 auto; }
  .category { margin-bottom: 2rem; }
  .category-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: #333; border-bottom: 2px solid #e0e0d8; padding-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  
  .dish { background: #fff; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #e0e0d8; }
  .dish-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
  .dish-name { font-weight: 600; font-size: 1rem; color: #111; margin: 0; padding-right: 10px; }
  .dish-price { font-weight: 700; color: var(--primary); font-size: 1rem; white-space: nowrap; }
  .dish-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin: 0; }
  
  .dish-unavailable { opacity: 0.5; }
  .badge-unavailable { display: inline-block; font-size: 0.7rem; background: #FDE8E8; color: #C0392B; padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-top: 6px; text-transform: uppercase; }
  
  .footer { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); padding: 0 1.5rem; z-index: 100; border-top: 1px solid #e0e0d8; }
  .btn-wa { display: flex; align-items: center; justify-content: center; gap: 8px; background: #25D366; color: #fff; text-decoration: none; padding: 14px 24px; border-radius: 100px; font-size: 1.05rem; font-weight: 600; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(37,211,102,0.3); transition: transform 0.2s; }
  .btn-wa:active { transform: scale(0.96); }
  
  .loading { text-align: center; padding: 3rem 1rem; color: #888; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="header">
  <h1 id="table-name">Cargando...</h1>
  <p>Revisa nuestro menú y pide por WhatsApp</p>
</div>

<div class="menu-container" id="menu-content">
  <div class="loading">Cargando el delicioso menú...</div>
</div>

<div class="footer">
  <a href="#" id="wa-btn" class="btn-wa" style="display:none;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a9 9 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
    Hacer pedido
  </a>
</div>

<script>
async function init() {
  const tableId = window.location.pathname.split('/').pop();
  try {
    const res = await fetch(`/api/public/menu-context/${tableId}`);
    if (res.ok) {
      const data = await res.json();
      document.getElementById('table-name').textContent = data.table_name;
      document.title = `Menú - ${data.table_name}`;
      
      const waBtn = document.getElementById('wa-btn');
      waBtn.href = data.wa_url;
      waBtn.style.display = 'flex';

      renderMenu(data.menu, data.availability);
    } else {
      document.getElementById('menu-content').innerHTML = '<div class="loading">Mesa no encontrada. Verifica el código QR.</div>';
      document.getElementById('table-name').textContent = 'Error';
    }
  } catch(e) {
    document.getElementById('menu-content').innerHTML = '<div class="loading">Error cargando el menú. Intenta nuevamente.</div>';
  }
}

function renderMenu(menu, availability) {
  const container = document.getElementById('menu-content');
  if (!menu || Object.keys(menu).length === 0) {
    container.innerHTML = '<div class="loading">No hay platos disponibles en el menú por el momento.</div>';
    return;
  }

  let html = '';
  for (const [category, items] of Object.entries(menu)) {
    if (!items || items.length === 0) continue;
    
    html += `<div class="category"><div class="category-title">${category}</div>`;
    
    items.forEach(item => {
      const isAvail = availability[item.name] !== false;
      const fmtPrice = item.price ? '$' + Number(item.price).toLocaleString('es-CO') : '';
      
      html += `
        <div class="dish ${!isAvail ? 'dish-unavailable' : ''}">
          <div class="dish-header">
            <h3 class="dish-name">${item.name}</h3>
            <div class="dish-price">${fmtPrice}</div>
          </div>
          <p class="dish-desc">${item.description || ''}</p>
          ${!isAvail ? '<span class="badge-unavailable">Agotado</span>' : ''}
        </div>
      `;
    });
    
    html += `</div>`;
  }
  container.innerHTML = html;
}

init();
</script>
</body>
</html>
