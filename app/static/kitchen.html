<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesio — Cocina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D0D0D;color:#fff;min-height:100vh;}
header{background:#111;border-bottom:1px solid #222;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.2rem;font-weight:700;color:#fff;}.logo span{color:#1D9E75;}
.header-right{display:flex;align-items:center;gap:12px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-text{font-size:12px;color:#1D9E75;}
.time{font-size:13px;color:#666;}
.note-banner{background:#1A1500;border-bottom:1px solid #3A2E00;padding:8px 1.5rem;font-size:12px;color:#FAC775;display:flex;align-items:center;gap:8px;}
.main{padding:1.5rem;}
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.col-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:.75rem;padding:.5rem .75rem;border-radius:6px;}
.col-recibido .col-title{color:#FAC775;background:rgba(250,199,117,.08);}
.col-preparacion .col-title{color:#378ADD;background:rgba(55,138,221,.08);}
.col-listo .col-title{color:#1D9E75;background:rgba(29,158,117,.08);}
.order-card{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:12px;padding:1rem;margin-bottom:.75rem;transition:border-color .2s;}
.order-card:hover{border-color:#333;}
.order-card.recibido{border-left:3px solid #FAC775;}
.order-card.en_preparacion{border-left:3px solid #378ADD;}
.order-card.listo{border-left:3px solid #1D9E75;}
/* Tarjeta de adicional post-entrega: borde naranja pulsante */
.order-card.adicional-entregado{border-left:3px solid #FF6B35;border-top:1px solid #FF6B35;animation:border-pulse 1.5s ease-in-out infinite;}
@keyframes border-pulse{0%,100%{border-color:#FF6B35}50%{border-color:#FF9A6B}}
.order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.order-id{font-size:11px;font-weight:700;color:#888;letter-spacing:.05em;}
.order-table{font-size:14px;font-weight:700;color:#fff;}
.elapsed{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500;}
.elapsed.ok{background:rgba(29,158,117,.15);color:#1D9E75;}
.elapsed.warn{background:rgba(250,199,117,.15);color:#FAC775;}
.elapsed.late{background:rgba(226,75,74,.15);color:#E24B4A;}
.order-items{margin-bottom:.75rem;}
.order-item{font-size:13px;color:#ddd;padding:3px 0;display:flex;gap:6px;}
.order-item-qty{color:#1D9E75;font-weight:600;flex-shrink:0;}
.order-notes{font-size:11px;color:#666;background:#111;border-radius:6px;padding:5px 8px;margin-bottom:.75rem;font-style:italic;}
.order-actions{display:flex;gap:6px;}
.btn{flex:1;padding:7px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn:active{transform:scale(.97);}
.btn-prep{background:rgba(55,138,221,.2);color:#378ADD;border:1px solid rgba(55,138,221,.3);}
.btn-prep:hover{background:rgba(55,138,221,.35);}
.btn-listo{background:rgba(29,158,117,.2);color:#1D9E75;border:1px solid rgba(29,158,117,.3);}
.btn-listo:hover{background:rgba(29,158,117,.35);}
.listo-badge{width:100%;padding:7px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;background:rgba(29,158,117,.08);color:#1D9E75;border:1px solid rgba(29,158,117,.2);cursor:default;}
.empty{text-align:center;padding:2rem;color:#333;font-size:13px;}
.badge-count{display:inline-block;background:#1D9E75;color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:6px;}
.notification{position:fixed;top:1rem;right:1rem;background:#1D9E75;color:#000;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;transform:translateY(-100px);transition:transform .3s;z-index:100;}
.notification.show{transform:translateY(0);}
.additional-banner{background:rgba(250,199,117,.08);border:1px solid rgba(250,199,117,.35);border-radius:8px;padding:8px 10px;margin-bottom:.6rem;}
.additional-label{font-size:10px;font-weight:700;color:#FAC775;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.order-item-add{font-size:13px;color:#FAC775;padding:2px 0;display:flex;gap:6px;}
/* Banner especial para adicional cuando ya fue entregado */
.additional-banner-urgent{background:rgba(255,107,53,.1);border:1.5px solid rgba(255,107,53,.5);border-radius:8px;padding:8px 10px;margin-bottom:.6rem;}
.additional-label-urgent{font-size:10px;font-weight:700;color:#FF6B35;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.order-item-add-urgent{font-size:13px;color:#FF9A6B;padding:2px 0;display:flex;gap:6px;}
/* Tag "ya entregado" */
.delivered-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(29,158,117,.12);border:1px solid rgba(29,158,117,.3);color:#1D9E75;font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;margin-bottom:6px;}
</style>
</head>
<body>

<header>
  <div class="logo">Mesio<span>.</span> <span style="font-size:13px;color:#555;font-weight:400;">Cocina</span></div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-text">En vivo</span>
    <span class="time" id="clock"></span>
  </div>
</header>

<div class="note-banner">
  ⚠️ El mesero marca los pedidos como <strong>Entregado</strong> desde su panel. Aquí solo puedes avanzar hasta <strong>Listo para servir</strong>.
</div>

<div class="main">
  <div class="board">
    <div>
      <div class="col-title col-recibido">🔔 Recibidos <span class="badge-count" id="count-recibido">0</span></div>
      <div id="col-recibido"></div>
    </div>
    <div>
      <div class="col-title col-preparacion">👨‍🍳 En preparación <span class="badge-count" id="count-preparacion">0</span></div>
      <div id="col-preparacion"></div>
    </div>
    <div>
      <div class="col-title col-listo">✅ Listos para servir <span class="badge-count" id="count-listo">0</span></div>
      <div id="col-listo"></div>
    </div>
  </div>
</div>

<div class="notification" id="notif"></div>

<script>
const token = localStorage.getItem('rb_token');
if (!token) window.location.href = '/login';
const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

function clock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
clock(); setInterval(clock, 1000);

function elapsed(createdAt) {
  // Forzar parse UTC: el backend devuelve ISO sin timezone
  const isoUtc = createdAt.endsWith('Z') ? createdAt : createdAt + 'Z';
  const diff = Math.floor((Date.now() - new Date(isoUtc).getTime()) / 1000);
  const min = Math.max(0, Math.floor(diff / 60));
  const secs = Math.max(0, diff % 60);
  const cls = min < 5 ? 'ok' : min < 12 ? 'warn' : 'late';
  return `<span class="elapsed ${cls}">${min}m ${secs}s</span>`;
}

function notify(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3000);
}

async function updateStatus(orderId, status) {
  try {
    await fetch(`/api/table-orders/${orderId}/status`, {
      method: 'POST', headers,
      body: JSON.stringify({status})
    });
    if (status === 'listo') notify('✅ Pedido listo para servir — avisa al mesero');
    loadOrders();
  } catch(e) { console.error(e); }
}

function renderCard(o) {
  const additional = Array.isArray(o.items_additional) ? o.items_additional : [];
  const additionalNames = new Set(additional.map(i => i.name));
  const isDelivered = o.status === 'entregado';

  // Items base = todos menos los adicionales actuales
  const baseItems = (Array.isArray(o.items) ? o.items : []).filter(i => !additionalNames.has(i.name));

  let itemsHtml = '';
  // Para pedidos 'entregado' con adicional: mostrar los items base con tachado (ya preparados)
  // Para el resto: mostrar normalmente
  if (baseItems.length && !isDelivered) {
    itemsHtml = baseItems.map(i => {
      const qty  = i.quantity || 1;
      const name = i.name || i;
      return `<div class="order-item"><span class="order-item-qty">${qty}×</span><span>${name}</span></div>`;
    }).join('');
  } else if (baseItems.length && isDelivered) {
    // Items ya entregados — mostrar en gris tachado como referencia
    itemsHtml = baseItems.map(i => {
      const qty  = i.quantity || 1;
      const name = i.name || i;
      return `<div class="order-item" style="opacity:.4;text-decoration:line-through;"><span class="order-item-qty" style="color:#555;">${qty}×</span><span style="color:#555;">${name}</span></div>`;
    }).join('');
  }

  // Banner de adicionales
  let additionalHtml = '';
  if (additional.length) {
    if (isDelivered) {
      // Adicional llegó DESPUÉS de que el pedido fue entregado — banner urgente naranja
      const addRows = additional.map(i =>
        `<div class="order-item-add-urgent"><span class="order-item-qty" style="color:#FF6B35;">+${i.quantity||1}×</span><span>${i.name||i}</span></div>`
      ).join('');
      additionalHtml = `<div class="additional-banner-urgent">
        <div class="additional-label-urgent">🔥 ADICIONAL POST-ENTREGA</div>
        ${addRows}
      </div>`;
    } else {
      // Adicional normal (pedido en preparación o listo)
      const addRows = additional.map(i =>
        `<div class="order-item-add"><span class="order-item-qty" style="color:#FAC775;">+${i.quantity||1}×</span><span>${i.name||i}</span></div>`
      ).join('');
      additionalHtml = `<div class="additional-banner">
        <div class="additional-label">🆕 ADICIONAL</div>
        ${addRows}
      </div>`;
    }
  }

  const notesHtml = o.notes ? `<div class="order-notes">📝 ${o.notes}</div>` : '';

  // Para pedido entregado con adicional: tag informativo + botón para marcar el adicional como preparado
  let actions = '';
  let deliveredTagHtml = '';
  if (isDelivered && additional.length) {
    deliveredTagHtml = `<div class="delivered-tag">✅ Comida ya entregada</div>`;
    actions = `<button class="btn btn-prep" onclick="updateStatus('${o.id}','en_preparacion')" style="background:rgba(255,107,53,.2);color:#FF6B35;border:1px solid rgba(255,107,53,.3);">
      🔥 Preparar adicional
    </button>`;
  } else if (o.status === 'recibido') {
    actions = `<button class="btn btn-prep" onclick="updateStatus('${o.id}','en_preparacion')">👨‍🍳 En preparación</button>`;
  } else if (o.status === 'en_preparacion') {
    actions = `<button class="btn btn-listo" onclick="updateStatus('${o.id}','listo')">✅ Listo para servir</button>`;
  } else if (o.status === 'listo') {
    actions = `<div class="listo-badge">🛎️ Esperando al mesero</div>`;
  }

  // Clase CSS de la tarjeta
  const statusClass = isDelivered && additional.length
    ? 'adicional-entregado'
    : o.status.replace('_','-');

  return `<div class="order-card ${statusClass}">
    <div class="order-header">
      <div>
        <div class="order-table">${o.table_name}</div>
        <div class="order-id">${o.id}</div>
      </div>
      ${elapsed(o.created_at)}
    </div>
    ${deliveredTagHtml}
    <div class="order-items">${itemsHtml || (additional.length ? '' : '<div class="order-item">Pedido en proceso</div>')}</div>
    ${additionalHtml}
    ${notesHtml}
    <div class="order-actions">${actions}</div>
  </div>`;
}

let prevOrderIds = new Set();

async function loadOrders() {
  try {
    const r = await fetch('/api/table-orders', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) { if(r.status === 401) window.location.href = '/login'; return; }
    const d = await r.json();
    const orders = d.orders || [];

    const currentIds = new Set(orders.map(o => o.id));
    for (const id of currentIds) {
      if (!prevOrderIds.has(id)) {
        const o = orders.find(x => x.id === id);
        if (o) notify(`🔔 Nuevo pedido — ${o.table_name}`);
      }
    }
    // También notificar si un pedido ya conocido recibió adicional post-entrega
    for (const o of orders) {
      if (
        o.status === 'entregado' &&
        Array.isArray(o.items_additional) &&
        o.items_additional.length > 0 &&
        prevOrderIds.has(o.id)
      ) {
        // Solo notificar si el set de adicionales cambió (no spammear)
        const prevCard = document.querySelector(`[data-order-id="${o.id}"]`);
        if (!prevCard) {
          notify(`🔥 Adicional post-entrega — ${o.table_name}`);
        }
      }
    }
    prevOrderIds = currentIds;

    // Separar por columnas
    // 'entregado' con items_additional va a la columna de 'recibido' para mayor visibilidad
    const groups = {recibido: [], en_preparacion: [], listo: []};
    orders.forEach(o => {
      if (o.status === 'entregado' && Array.isArray(o.items_additional) && o.items_additional.length > 0) {
        // Adicional post-entrega → columna "Recibidos" para máxima atención
        groups.recibido.push(o);
      } else if (groups[o.status]) {
        groups[o.status].push(o);
      }
    });

    ['recibido','en_preparacion','listo'].forEach(s => {
      const colId   = s === 'en_preparacion' ? 'col-preparacion' : 'col-' + s;
      const countId = s === 'en_preparacion' ? 'count-preparacion' : 'count-' + s;
      const col   = document.getElementById(colId);
      const count = document.getElementById(countId);
      if (col) {
        // Marcar cada tarjeta con data-order-id para detectar cambios
        const html = groups[s].length
          ? groups[s].map(o => `<div data-order-id="${o.id}">${renderCard(o)}</div>`).join('')
          : '<div class="empty">Sin pedidos</div>';
        col.innerHTML = html;
      }
      if (count) count.textContent = groups[s].length;
    });
  } catch(e) { console.error(e); }
}

loadOrders();
setInterval(loadOrders, 5000);
</script>
</body>
</html>
