<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mesio — Cocina</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0D0D0D; color:#fff; min-height:100vh; }

/* ── HEADER Y NAVEGACIÓN ── */
header { background:#111; border-bottom:1px solid #222; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:1.2rem; font-weight:700; color:#fff; display:flex; align-items:center; }
.logo span { color:#1D9E75; }

/* Barra dinámica insertada por roles.js */
.role-nav { display: flex; gap: 8px; background: #222; padding: 4px; border-radius: 10px; margin-left: 20px; }
.role-btn { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; color: #888; text-decoration: none; transition: all 0.2s; }
.role-btn.active { background: #1D9E75; color: #fff; }
.role-btn:hover:not(.active) { color: #fff; background: #333; }

.header-right { display:flex; align-items:center; gap:12px; }
.live-dot { width:8px; height:8px; border-radius:50%; background:#1D9E75; animation:pulse 2s infinite; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }
.live-text { font-size:12px; color:#1D9E75; }
.time { font-size:13px; color:#666; }
.btn-logout { width:auto; padding:5px 12px; background:none; border:1px solid #333; border-radius:8px; color:#aaa; margin-left:15px; cursor:pointer; font-size:12px; font-weight:600; transition:all .15s;}
.btn-logout:hover { color:#fff; border-color:#555; }

/* ── MAIN BOARD ── */
.main { padding:1.5rem; }
.board { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
@media(max-width:900px){ .board{grid-template-columns:1fr;} }
@media(max-width:600px){
  header { padding:.75rem 1rem; }
  .role-nav { display:none !important; }
  .logo span:last-of-type { display:none; }
  .main { padding:1rem; }
  .btn { padding:12px; font-size:14px; }
}

.col-header { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-bottom:.75rem; padding:.5rem .75rem; border-radius:6px; display:flex; align-items:center; gap:8px; }
.col-recibido    .col-header { color:#FAC775; background:rgba(250,199,117,.08); }
.col-preparacion .col-header { color:#378ADD; background:rgba(55,138,221,.08); }
.col-listo       .col-header { color:#1D9E75; background:rgba(29,158,117,.08); }
.badge { background:#1D9E75; color:#000; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:auto; }

/* ── TARJETAS ── */
.order-card { background:#1A1A1A; border:1px solid #2A2A2A; border-radius:12px; padding:1rem; margin-bottom:.75rem; transition:border-color .2s; }
.order-card:hover { border-color:#333; }
.order-card.recibido      { border-left:3px solid #FAC775; }
.order-card.en_preparacion{ border-left:3px solid #378ADD; }
.order-card.listo         { border-left:3px solid #1D9E75; }

.sub-tag { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:2px 8px; border-radius:8px; margin-bottom:6px; }
.sub-tag.first { background:rgba(29,158,117,.12); color:#1D9E75; }
.sub-tag.add   { background:rgba(250,199,117,.12); color:#FAC775; }

.order-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:.5rem; }
.order-table { font-size:15px; font-weight:700; color:#fff; }
.order-id { font-size:10px; color:#555; margin-top:2px; }

.elapsed { font-size:10px; padding:2px 6px; border-radius:8px; font-weight:500; flex-shrink:0; }
.elapsed.ok   { background:rgba(29,158,117,.15); color:#1D9E75; }
.elapsed.warn { background:rgba(250,199,117,.15); color:#FAC775; }
.elapsed.late { background:rgba(226,75,74,.15); color:#E24B4A; }

.order-items { margin-bottom:.75rem; }
.order-item { font-size:13px; color:#ddd; padding:3px 0; display:flex; gap:6px; }
.order-item-qty { color:#1D9E75; font-weight:600; flex-shrink:0; }
.order-notes { font-size:11px; color:#666; background:#111; border-radius:6px; padding:5px 8px; margin-bottom:.75rem; font-style:italic; }

.btn { width:100%; padding:8px; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
.btn:active { transform:scale(.97); }
.btn-prep { background:rgba(55,138,221,.2); color:#378ADD; border:1px solid rgba(55,138,221,.3); }
.btn-prep:hover { background:rgba(55,138,221,.35); }
.btn-listo { background:rgba(29,158,117,.2); color:#1D9E75; border:1px solid rgba(29,158,117,.3); }
.btn-listo:hover { background:rgba(29,158,117,.35); }
.listo-badge { width:100%; padding:8px; border-radius:8px; font-size:12px; font-weight:600; text-align:center; background:rgba(29,158,117,.08); color:#1D9E75; border:1px solid rgba(29,158,117,.2); }

.empty { text-align:center; padding:2rem; color:#333; font-size:13px; }
.notification { position:fixed; top:1rem; right:1rem; background:#1D9E75; color:#000; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600; transform:translateY(-100px); transition:transform .3s; z-index:100; max-width:300px; }
.notification.show { transform:translateY(0); }
.btn-print { background:rgba(255,255,255,.06); color:#666; border:1px solid #2A2A2A; margin-bottom:6px; }
</style>
</head>
<body>

  <header>
    <div class="logo">Mesio<span>.</span> <span style="font-size:13px;color:#555;font-weight:400;margin-left:8px;">Cocina</span>
      <div id="dynamic-role-nav" class="role-nav" style="display: none;"></div>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <span class="live-text">En vivo</span>
      <span class="time" id="clock"></span>
      <button class="btn-logout" onclick=doStaffLogout();">Salir</button>
    </div>
  </header>

<div class="main">
  <div class="board">
    <div class="col-recibido">
      <div class="col-header">🔔 Recibidos <span class="badge" id="cnt-recibido">0</span></div>
      <div id="col-recibido"></div>
    </div>
    <div class="col-preparacion">
      <div class="col-header">👨‍🍳 En preparación <span class="badge" id="cnt-preparacion">0</span></div>
      <div id="col-preparacion"></div>
    </div>
    <div class="col-listo">
      <div class="col-header">✅ Listos para servir <span class="badge" id="cnt-listo">0</span></div>
      <div id="col-listo"></div>
    </div>
  </div>
</div>

<div class="notification" id="notif"></div>

<script src="/static/js/roles.js"></script>
<script>
const token = localStorage.getItem('rb_token');
if (!token) window.location.href = '/login';
const hdr = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

function clock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString(navigator.language || 'default', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
clock(); setInterval(clock, 1000);

let notifTimer = null;
function notify(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  if (notifTimer) clearTimeout(notifTimer);
  notifTimer = setTimeout(() => n.classList.remove('show'), 3500);
}

function elapsed(createdAt) {
  const iso  = createdAt.endsWith('Z') ? createdAt : createdAt + 'Z';
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  const min  = Math.max(0, Math.floor(diff / 60));
  const sec  = Math.max(0, diff % 60);
  const cls  = min < 5 ? 'ok' : min < 12 ? 'warn' : 'late';
  return `<span class="elapsed ${cls}">${min}m ${sec}s</span>`;
}

async function setStatus(orderId, status) {
  try {
    await fetch(`/api/table-orders/${orderId}/status`, {
      method: 'POST', headers: hdr, body: JSON.stringify({status})
    });
    if (status === 'listo')          notify('✅ Listo para servir — avisa al mesero');
    if (status === 'en_preparacion') notify('👨‍🍳 Preparando...');
    loadOrders();
  } catch(e) { console.error(e); }
}

function renderCard(o) {
  _ordersMap[o.id] = o;
  const items   = Array.isArray(o.items) ? o.items : [];
  const subNum  = o.sub_number || 1;
  const isAdd   = o.base_order_id && subNum > 1;
  const isDel   = o.is_delivery || false;

  const subTag = isDel
    ? `<div class="sub-tag add">🛵 Domicilio/Recoger</div>`
    : isAdd
      ? `<div class="sub-tag add">➕ Adicional #${subNum}</div>`
      : `<div class="sub-tag first">🆕 Pedido inicial</div>`;

  const itemsHtml = items.length
    ? items.map(i => `<div class="order-item"><span class="order-item-qty">${i.quantity || i.qty || 1}×</span><span>${i.name || ''}</span></div>`).join('')
    : '<div class="order-item" style="color:#555;">Sin items</div>';

  const notesHtml = o.notes ? `<div class="order-notes">📝 ${o.notes}</div>` : '';

  let actionHtml = '';
  if (isDel) {
    const oid = o.original_id || o.id;
    if (o.status === 'recibido') {
      actionHtml = `<button class="btn btn-prep" onclick="setDeliveryStatus('${oid}','en_preparacion')">👨‍🍳 En preparación</button>`;
    } else if (o.status === 'en_preparacion') {
      actionHtml = `<button class="btn btn-listo" onclick="setDeliveryStatus('${oid}','listo')">✅ Listo para domiciliario</button>`;
    } else {
      actionHtml = `<div class="listo-badge">📦 Esperando domiciliario</div>`;
    }
  } else {
    if (o.status === 'recibido') {
      actionHtml = `<button class="btn btn-prep" onclick="setStatus('${o.id}','en_preparacion')">👨‍🍳 En preparación</button>`;
    } else if (o.status === 'en_preparacion') {
      actionHtml = `<button class="btn btn-listo" onclick="setStatus('${o.id}','listo')">✅ Listo para servir</button>`;
    } else {
      actionHtml = `<div class="listo-badge">🛎️ Esperando al mesero</div>`;
    }
  }

  return `<div class="order-card ${o.status.replace('_','-')}" data-id="${o.id}">
    ${subTag}
    <div class="order-header">
      <div><div class="order-table">${o.table_name}</div><div class="order-id">${o.id}</div></div>
      ${elapsed(o.created_at)}
    </div>
    <div class="order-items">${itemsHtml}</div>
    ${notesHtml}
    <button class="btn btn-print" onclick="printComanda('${o.id}')">🖨️ Imprimir Comanda</button>
    ${actionHtml}
  </div>`;
}

async function setStatus(orderId, status) {
  try {
    await fetch(`/api/table-orders/${orderId}/status`, {
      method: 'POST', headers: hdr, body: JSON.stringify({ status })
    });
    if (status === 'listo') notify('✅ Listo para servir — avisa al mesero');
    if (status === 'en_preparacion') notify('👨‍🍳 Preparando...');
    loadOrders();
  } catch(e) { console.error(e); }
}

async function setDeliveryStatus(orderId, status) {
  try {
    // Usamos la nueva ruta de la cocina
    await fetch(`/api/kitchen/delivery-orders/${orderId}/status`, {
      method: 'PATCH', headers: hdr, body: JSON.stringify({ status })
    });
    if (status === 'listo') notify('📦 Listo para domiciliario');
    if (status === 'en_preparacion') notify('👨‍🍳 Preparando domicilio...');
    loadOrders();
  } catch(e) { console.error(e); }
}

const _ordersMap = {};

function printComanda(orderId) {
  const o = _ordersMap[orderId];
  if (!o) return;
  const items = Array.isArray(o.items) ? o.items : [];
  const iso = (o.created_at || '').endsWith('Z') ? o.created_at : (o.created_at || '') + 'Z';
  const dt = new Date(iso);
  const timeStr = dt.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
  const dateStr = dt.toLocaleDateString('es-CO');
  const subNum = o.sub_number || 1;
  const subLabel = (o.base_order_id && subNum > 1) ? `ADICIONAL #${subNum}` : 'PEDIDO INICIAL';
  const itemsHtml = items.map(i =>
    `<div class="item"><span class="qty">${i.quantity||i.qty||1}x</span> ${i.name||''}</div>`
  ).join('');
  const notesHtml = o.notes
    ? `<div class="sep"></div><div class="notes">NOTAS: ${o.notes}</div>`
    : '';
  const win = window.open('', '_blank', 'width=340,height=560,toolbar=0,menubar=0');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Comanda ${o.table_name}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',Courier,monospace;width:72mm;padding:4mm;font-size:10pt;color:#000;background:#fff}
@page{size:80mm auto;margin:0}
.title{font-size:13pt;font-weight:bold;text-align:center;letter-spacing:2px}
.sub{font-size:8pt;text-align:center;margin-bottom:2px}
.sep{border-top:1px dashed #000;margin:5px 0}
.label{font-size:8pt;color:#444;margin-top:3px}
.mesa{font-size:15pt;font-weight:bold}
.item{font-size:11pt;margin:3px 0}
.qty{font-weight:bold;display:inline-block;width:22px}
.notes{font-size:9pt;font-style:italic;margin-top:3px}
.footer{text-align:center;font-size:8pt;margin-top:4px}
</style></head><body>
<div class="title">COMANDA</div>
<div class="sub">${subLabel}</div>
<div class="sep"></div>
<div class="label">MESA</div>
<div class="mesa">${o.table_name}</div>
<div class="label">Hora: ${timeStr} &nbsp;|&nbsp; ${dateStr}</div>
<div class="sep"></div>
<div class="label" style="font-weight:bold;margin-bottom:3px">ITEMS</div>
${itemsHtml}
${notesHtml}
<div class="sep"></div>
<div class="footer">— Mesio POS —</div>
</body></html>`);
  win.document.close();
  win.focus();
  win.onload = () => { win.print(); };
}

let prevIds = new Set();

async function loadOrders() {
  try {
    const r1 = await fetch('/api/table-orders?station=kitchen', { headers: hdr });
    if (!r1.ok) { if (r1.status === 401) window.location.href = '/login'; return; }
    const { orders: tableOrders = [] } = await r1.json();

    const r2 = await fetch('/api/kitchen/delivery-orders', { headers: hdr });
    const { orders: deliveryOrders = [] } = r2.ok ? await r2.json() : { orders: [] };

    const normalizedDelivery = deliveryOrders
      .filter(o => !['en_camino', 'en_puerta', 'entregado', 'cancelado'].includes(o.status))
      .map(o => ({
        id: o.id,
        table_name: o.order_type === 'domicilio'
          ? `🛵 Domicilio — ${(o.phone || '').slice(-4)}`
          : `🏠 Recoger — ${(o.phone || '').slice(-4)}`,
        items: Array.isArray(o.items) ? o.items : [],
        notes: (o.notes || '') + (o.payment_method ? ` | Pago: ${o.payment_method}` : '') + (o.address ? ` | 📍 ${o.address}` : ''),
        status: mapDeliveryStatus(o.status),
        created_at: o.created_at,
        sub_number: 1,
        base_order_id: null,
        is_delivery: true,
        original_id: o.id,
      }));

    const orders = [...tableOrders, ...normalizedDelivery.filter(o => o.status !== null)];

    const curIds = new Set(orders.map(o => o.id));
    for (const id of curIds) {
      if (!prevIds.has(id)) {
        const o = orders.find(x => x.id === id);
        if (o) notify(`🔔 Nuevo pedido — ${o.table_name}`);
      }
    }
    prevIds = curIds;

    const groups = { recibido: [], en_preparacion: [], listo: [] };
    orders.forEach(o => { if (groups[o.status]) groups[o.status].push(o); });

    [['recibido', 'col-recibido', 'cnt-recibido'],
     ['en_preparacion', 'col-preparacion', 'cnt-preparacion'],
     ['listo', 'col-listo', 'cnt-listo']].forEach(([status, colId, cntId]) => {
      const col = document.getElementById(colId);
      const cnt = document.getElementById(cntId);
      if (col) col.innerHTML = groups[status].length
        ? groups[status].map(renderCard).join('')
        : '<div class="empty">Sin pedidos</div>';
      if (cnt) cnt.textContent = groups[status].length;
    });

  } catch(e) { console.error('loadOrders error:', e); }
}

function mapDeliveryStatus(s) {
  if (s === 'confirmado') return 'recibido';
  if (s === 'en_preparacion') return 'en_preparacion';
  if (s === 'listo') return 'listo';
  // en_camino / en_puerta / entregado: ya salieron de cocina — no deben aparecer
  return null;
}

loadOrders();
setInterval(loadOrders, 5000);

function doLogout() { doStaffLogout(); }


</script>
</body>
</html>
