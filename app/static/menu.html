<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title id="page-title">Menú — Mesio</title>
<meta name="theme-color" content="#0D1412">
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --bg: #0D1412;
  --bg2: #111A18;
  --bg3: #162019;
  --border: rgba(29,158,117,.18);
  --text: #F0F0EC;
  --muted: #7A8C87;
  --card: #131F1C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px; /* espacio para el botón fijo */
}

/* ── HEADER ── */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 1.25rem 1.25rem .75rem;
  position: sticky; top: 0; z-index: 50;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .5rem;
}
.logo { font-size: 1.1rem; font-weight: 800; color: #fff; }
.logo span { color: var(--green); }
.rest-name { font-size: 1.1rem; font-weight: 700; color: #fff; }
.table-badge {
  font-size: .72rem; font-weight: 600;
  background: rgba(29,158,117,.15); color: var(--green);
  border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 20px;
}

/* ── CATEGORÍAS NAV ── */
.cat-nav {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 2px; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap; font-size: .78rem; font-weight: 500;
  padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  transition: all .2s; flex-shrink: 0;
}
.cat-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

/* ── SECCIONES ── */
.sections { padding: 0 1rem; margin-top: 1.25rem; }
.section { margin-bottom: 2rem; }
.section-title {
  font-size: .7rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--green);
  margin-bottom: 1rem; padding-left: 2px;
}

/* ── TARJETAS DE PLATO ── */
.dish-card {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1rem; margin-bottom: 10px;
  transition: border-color .15s;
}
.dish-card:active { border-color: var(--green); }
.dish-info { flex: 1; min-width: 0; }
.dish-name { font-size: .95rem; font-weight: 600; color: #fff; margin-bottom: 3px; }
.dish-desc { font-size: .78rem; color: var(--muted); line-height: 1.45; margin-bottom: 6px; }
.dish-price { font-size: 1rem; font-weight: 700; color: var(--green); }
.dish-badge {
  font-size: .65rem; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; margin-left: 8px; vertical-align: middle;
}
.badge-veg { background: rgba(29,158,117,.15); color: var(--green); }
.dish-unavailable { opacity: .35; }
.dish-unavailable .dish-name { text-decoration: line-through; }
.unavail-tag {
  font-size: .68rem; color: #666; background: rgba(255,255,255,.04);
  padding: 2px 8px; border-radius: 8px; display: inline-block; margin-top: 4px;
}

/* ── BOTÓN FIJO PEDIR ── */
.order-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 1rem 1.25rem 1.25rem;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
  z-index: 100;
}
.order-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 1rem 1.5rem;
  background: #25D366; color: #fff;
  border: none; border-radius: 14px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 24px rgba(37,211,102,.35);
  text-decoration: none;
  transition: transform .15s, box-shadow .15s;
}
.order-btn:active { transform: scale(.98); box-shadow: 0 2px 12px rgba(37,211,102,.25); }
.wa-icon { width: 22px; height: 22px; flex-shrink: 0; }

/* ── LOADING ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 12px;
  color: var(--muted); font-size: .9rem;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--green); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR ── */
.error-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 8px;
  color: var(--muted); text-align: center; padding: 2rem;
}
.error-state h2 { color: #fff; font-size: 1.1rem; }
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>Cargando menú...</span>
  </div>
</div>

<script>
// table_id y wa_number se inyectan desde el servidor en la URL
// /menu/{table_id}  →  carga el menú del restaurante de esa mesa

const pathParts = window.location.pathname.split('/');
const tableId   = pathParts[pathParts.length - 1];

async function loadMenu() {
  try {
    const r = await fetch('/api/public/menu/' + tableId);
    if (!r.ok) throw new Error('not found');
    const data = await r.json();
    render(data);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="error-state">
        <h2>No se pudo cargar el menú</h2>
        <p>Escanea el QR nuevamente o pide ayuda al mesero.</p>
      </div>`;
  }
}

function fmt(price) {
  if (!price) return '';
  return '$' + Number(price).toLocaleString('es-CO');
}

function render(data) {
  const { table_name, wa_url, menu, availability } = data;
  document.title = `Menú — ${data.restaurant_name || 'Restaurante'}`;

  const categories = Object.keys(menu);

  // Nav de categorías
  const catNav = categories.map((cat, i) =>
    `<button class="cat-btn${i===0?' active':''}" onclick="scrollTo('cat-${i}',this)">${cat}</button>`
  ).join('');

  // Secciones del menú
  const sections = categories.map((cat, i) => {
    const dishes = menu[cat] || [];
    const items = dishes.map(d => {
      const avail   = availability[d.name] !== false;
      const vegTag  = d.vegetarian ? `<span class="dish-badge badge-veg">🌱 Veg</span>` : '';
      const unavailTag = !avail ? `<div class="unavail-tag">No disponible</div>` : '';
      return `
        <div class="dish-card${avail ? '' : ' dish-unavailable'}">
          <div class="dish-info">
            <div class="dish-name">${d.name}${vegTag}</div>
            ${d.description ? `<div class="dish-desc">${d.description}</div>` : ''}
            ${unavailTag}
            <div class="dish-price">${fmt(d.price)}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="section" id="cat-${i}">
        <div class="section-title">${cat}</div>
        ${items}
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="rest-name">${data.restaurant_name || 'Restaurante'}</div>
        <div class="table-badge">📍 ${table_name}</div>
      </div>
      <div class="cat-nav">${catNav}</div>
    </div>

    <div class="sections">${sections}</div>

    <div class="order-bar">
      <a href="${wa_url}" class="order-btn" target="_blank" rel="noopener">
        <svg class="wa-icon" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        </svg>
        Pedir por WhatsApp
      </a>
    </div>`;

  // Intersection observer para resaltar categoría activa en el nav
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = e.target.id.replace('cat-', '');
        document.querySelectorAll('.cat-btn').forEach((b, i) =>
          b.classList.toggle('active', String(i) === idx)
        );
      }
    });
  }, { threshold: 0.3 });

  categories.forEach((_, i) => {
    const el = document.getElementById('cat-' + i);
    if (el) observer.observe(el);
  });
}

function scrollTo(id, btn) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

loadMenu();
</script>
</body>
</html>
