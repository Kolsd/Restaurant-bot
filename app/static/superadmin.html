<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesio — Super Admin Control</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<style>
  :root {
    --bg: #09090b;
    --surface: #18181b;
    --border: #27272a;
    --primary: #39FF6A;
    --primary-dim: rgba(57, 255, 106, 0.1);
    --text: #f4f4f5;
    --text-muted: #a1a1aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body { background: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
  .container { width: 100%; max-width: 900px; }
  
  .header { display: flex; align-items: center; gap: 15px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
  .header-icon { font-size: 2.5rem; background: var(--primary-dim); padding: 12px; border-radius: 12px; }
  .header h1 { color: #fff; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  .header p { color: var(--primary); font-weight: 500; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .card-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
  .card-title span { color: var(--primary); }

  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
  textarea { height: 120px; resize: vertical; font-family: monospace; font-size: 0.85rem; }
  
  .btn-primary { background: var(--primary); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; width: 100%; transition: transform 0.1s, opacity 0.2s; margin-top: 10px; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }

  .ai-extract-box { display: flex; background: var(--bg); border: 1px solid var(--border); padding: 8px; border-radius: 8px; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ai-extract-box input[type="file"] { flex: 1; border: none; padding: 4px; background: transparent; }
  .btn-ai { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 500; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }

  /* Toggles para Módulos */
  .modules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; background: var(--bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
  .toggle-item { display: flex; align-items: center; justify-content: space-between; }
  .toggle-label { font-size: 0.9rem; font-weight: 500; color: #fff; display: flex; align-items: center; gap: 8px; }
  .toggle-label span { color: var(--text-muted); font-size: 1.2rem; }
  
  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .3s; border-radius: 34px; }
  .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #888; transition: .3s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--primary); }
  input:checked + .slider:before { transform: translateX(20px); background-color: #000; }
</style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <div class="header-icon">⚙️</div>
    <div>
      <h1>Mesio Control Center</h1>
      <p>Super Admin Access</p>
    </div>
  </div>

  <div class="card" style="border-color: var(--primary);">
    <div class="form-group" style="margin: 0;">
      <label style="color: var(--primary);">🔑 Llave Maestra (ADMIN_KEY)</label>
      <input type="password" id="admin_key" placeholder="Ingresa tu clave secreta de Railway..." />
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>1.</span> Alta de Cliente (Restaurante)</div>
    
    <div class="form-group">
      <label>Nombre del Restaurante</label>
      <input type="text" id="r_name" placeholder="Ej: Pizzería Don Juan" />
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div class="form-group">
        <label>WhatsApp (Con código de país, sin '+')</label>
        <input type="text" id="r_wa" placeholder="Ej: 573168191483" />
      </div>
      <div class="form-group">
        <label>Dirección Física</label>
        <input type="text" id="r_addr" placeholder="Ej: Calle 123 #45-67, Bogotá" />
      </div>
    </div>

    <label style="margin-top: 1rem; margin-bottom: 1rem; color:#fff; font-size:1rem;">⚡ Configuración de Módulos (SaaS)</label>
    <div class="modules-grid">
      <div class="toggle-item">
        <div class="toggle-label"><span>🛵</span> Módulo Pedidos (WA)</div>
        <label class="switch"><input type="checkbox" id="feat_orders" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-item">
        <div class="toggle-label"><span>🪑</span> Módulo Mesas (Dine-in)</div>
        <label class="switch"><input type="checkbox" id="feat_tables" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-item">
        <div class="toggle-label"><span>📅</span> Reservaciones</div>
        <label class="switch"><input type="checkbox" id="feat_reservations" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-item">
        <div class="toggle-label"><span>🧠</span> POS con Inteligencia Art.</div>
        <label class="switch"><input type="checkbox" id="feat_pos" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-item">
        <div class="toggle-label"><span>💳</span> Pagos Integrados (Wompi)</div>
        <label class="switch"><input type="checkbox" id="feat_wompi"><span class="slider"></span></label>
      </div>
    </div>

    <div class="form-group">
      <label>Menú JSON Database</label>
      <div class="ai-extract-box">
        <input type="file" id="menu_file" accept=".pdf, .png, .jpg, .jpeg" />
        <button onclick="parseMenuFile()" id="btn_parse" class="btn-ai">✨ Extraer con IA</button>
      </div>
      <textarea id="r_menu" placeholder='{"Pizzas": [{"name": "Margarita", "price": 25000}]}'></textarea>
    </div>

    <button class="btn-primary" onclick="createRestaurant()">Crear e Implementar Restaurante</button>
  </div>

  <div class="card">
    <div class="card-title"><span>2.</span> Accesos al Dashboard (Dueño)</div>
    <div class="form-group">
      <label>Asignar al restaurante (Debe coincidir exacto)</label>
      <input type="text" id="u_rest" placeholder="Ej: Pizzería Don Juan" />
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div class="form-group">
        <label>Correo / Usuario</label>
        <input type="text" id="u_email" placeholder="ejemplo@restaurante.com" />
      </div>
      <div class="form-group">
        <label>Contraseña Provisional</label>
        <input type="text" id="u_pass" placeholder="Contraseña segura" />
      </div>
    </div>
    <button class="btn-primary" onclick="createUser()">Generar Acceso</button>
  </div>

  <div class="card">
    <div class="card-title"><span style="color:#ef4444;">3.</span> Kill Switch & Suscripción</div>
    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem;">
      <div class="form-group">
        <label>ID del Restaurante</label>
        <input type="number" id="k_id" placeholder="Ej: 1" />
      </div>
      <div class="form-group">
        <label>Estado de la cuenta</label>
        <select id="k_status">
          <option value="active">🟢 ACTIVO (Al día)</option>
          <option value="past_due">🔴 SUSPENDIDO (Falta de pago)</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" style="background:#ef4444; color:#fff;" onclick="setKillSwitch()">Ejecutar Acción</button>
  </div>

</div>

<script>
  function getAdminKey() {
    const key = document.getElementById('admin_key').value;
    if (!key) alert("⚠️ Debes poner tu Llave Maestra arriba");
    return key;
  }

  async function parseMenuFile() {
    const key = getAdminKey(); if(!key) return;
    const fileInput = document.getElementById('menu_file');
    const btn = document.getElementById('btn_parse');
    
    if (!fileInput.files.length) { alert("⚠️ Selecciona un archivo PDF o imagen primero"); return; }

    btn.innerText = "⏳ Analizando..."; btn.disabled = true;
    const formData = new FormData(); formData.append("file", fileInput.files[0]);

    try {
      const res = await fetch(`/api/admin/parse-menu?admin_key=${key}`, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success) {
        document.getElementById('r_menu').value = JSON.stringify(data.json_menu, null, 2);
        alert("✅ ¡Menú extraído mágicamente!");
      } else { alert("❌ Error: " + (data.detail || data.error)); }
    } catch (e) { alert("❌ Error de conexión con la IA."); } 
    finally { btn.innerText = "✨ Extraer con IA"; btn.disabled = false; }
  }

  async function createRestaurant() {
    const key = getAdminKey(); if(!key) return;

    let menuJson;
    try {
      let rawText = document.getElementById('r_menu').value || '{}';
      rawText = rawText.replace(/[\n\r\t]/g, ' '); 
      menuJson = JSON.parse(rawText);
    } catch (e) { alert("❌ El texto aún tiene un error de JSON."); return; }

    // Empaquetar las features seleccionadas
    const featuresConfig = {
      module_orders: document.getElementById('feat_orders').checked,
      module_tables: document.getElementById('feat_tables').checked,
      module_reservations: document.getElementById('feat_reservations').checked,
      module_pos: document.getElementById('feat_pos').checked,
      wompi_active: document.getElementById('feat_wompi').checked
    };

    try {
      const res = await fetch('/api/admin/create-restaurant', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          admin_key: key,
          name: document.getElementById('r_name').value,
          whatsapp_number: document.getElementById('r_wa').value.replace(/[+\s]/g, ''),
          address: document.getElementById('r_addr').value,
          menu: JSON.stringify(menuJson),
          features: featuresConfig
        })
      });
      if (!res.ok) { const errorText = await res.text(); alert(`❌ Error del servidor (${res.status}):\n${errorText}`); return; }
      const data = await res.json();
      alert(data.success ? "✅ ¡Restaurante e infraestructura creados con éxito!" : "❌ Error: " + data.detail);
    } catch (e) { alert("❌ Error de conexión: " + e.message); }
  }

  async function createUser() {
    const key = getAdminKey(); if(!key) return;
    const res = await fetch('/api/admin/create-user', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        admin_key: key,
        restaurant_name: document.getElementById('u_rest').value,
        username: document.getElementById('u_email').value,
        password: document.getElementById('u_pass').value
      })
    });
    const data = await res.json();
    alert(data.success ? "✅ Usuario creado!" : "❌ Error: " + (data.detail || data.error));
  }

  async function setKillSwitch() {
    const key = getAdminKey(); if(!key) return;
    const res = await fetch('/api/admin/set-subscription', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        admin_key: key,
        restaurant_id: parseInt(document.getElementById('k_id').value),
        status: document.getElementById('k_status').value
      })
    });
    const data = await res.json();
    alert(data.success ? "✅ Suscripción actualizada!" : "❌ Error: " + (data.detail || data.error));
  }
</script>
</body>
</html>
