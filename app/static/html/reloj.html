<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mesio — Reloj de Personal</title>
  <link rel="icon" type="image/png" href="/static/img/logo.png">
  <style>
    :root {
      --green:       #39FF6A;
      --green-dim:   #1a8c3a;
      --red:         #FF4444;
      --red-dim:     #8c1a1a;
      --amber:       #F59E0B;
      --amber-dim:   #7c4f06;
      --gray:        #52525B;
      --gray-dim:    #27272A;
      --dark:        #18181B;
      --card:        #27272A;
      --border:      #3F3F46;
      --text:        #FAFAFA;
      --text-muted:  #A1A1AA;
      --radius:      16px;
      --radius-lg:   22px;
      --transition:  all 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 100dvh;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-logo {
      width: 36px; height: 36px;
      background: var(--green);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: #111;
    }
    .brand-name {
      font-size: 15px; font-weight: 700; color: var(--text);
      letter-spacing: 0.04em;
    }
    .brand-sub {
      font-size: 11px; color: var(--text-muted); font-weight: 400;
    }
    #webauthn-badge {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(57,255,106,0.12);
      color: var(--green);
      border: 1px solid rgba(57,255,106,0.25);
    }
    #webauthn-badge.unsupported {
      background: rgba(255,68,68,0.12);
      color: var(--red);
      border-color: rgba(255,68,68,0.25);
    }

    /* ── Clock ── */
    #clock-section {
      text-align: center;
      padding: 18px 24px 14px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    #clock-time {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(52px, 9vw, 88px);
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.05em;
      line-height: 1;
      text-shadow: 0 0 24px rgba(57,255,106,0.35);
    }
    #clock-date {
      font-size: clamp(14px, 2.5vw, 18px);
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: capitalize;
      letter-spacing: 0.02em;
    }

    /* ── Main buttons ── */
    #buttons-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 14px;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: var(--transition);
      padding: 0;
      min-height: 140px;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { transform: scale(0.96); }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .action-btn .btn-icon {
      font-size: clamp(36px, 6vw, 52px);
      line-height: 1;
    }
    .action-btn .btn-label {
      font-size: clamp(13px, 2vw, 17px);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #btn-entrada {
      background: linear-gradient(135deg, #0a5c2e 0%, #16a34a 60%, #22c55e 100%);
      color: #fff;
      box-shadow: 0 8px 28px rgba(34,197,94,0.3);
      grid-column: 1; grid-row: 1;
    }
    #btn-entrada:hover:not(:disabled) {
      box-shadow: 0 12px 36px rgba(34,197,94,0.45);
    }

    #btn-salida {
      background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 60%, #f97316 100%);
      color: #fff;
      box-shadow: 0 8px 28px rgba(239,68,68,0.3);
      grid-column: 2; grid-row: 1;
    }
    #btn-salida:hover:not(:disabled) {
      box-shadow: 0 12px 36px rgba(239,68,68,0.45);
    }

    #btn-break {
      background: linear-gradient(135deg, #451a03 0%, #b45309 60%, #f59e0b 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(245,158,11,0.25);
      min-height: 90px;
      grid-column: 1; grid-row: 2;
    }
    #btn-break:hover:not(:disabled) {
      box-shadow: 0 8px 28px rgba(245,158,11,0.38);
    }

    #btn-config {
      background: linear-gradient(135deg, #27272A 0%, #3F3F46 60%, #52525B 100%);
      color: var(--text-muted);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      min-height: 90px;
      border: 1px solid var(--border);
      grid-column: 2; grid-row: 2;
    }
    #btn-config:hover:not(:disabled) {
      color: var(--text);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }

    /* ── Activity feed ── */
    #feed-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 14px 24px 16px;
      border-top: 1px solid var(--border);
      margin-top: 14px;
      overflow: hidden;
    }
    #feed-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    #feed-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #feed-list::-webkit-scrollbar { width: 4px; }
    #feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 13px;
      border: 1px solid var(--border);
      animation: feedIn 0.3s ease;
      flex-shrink: 0;
    }
    @keyframes feedIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .feed-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .feed-dot.in  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .feed-dot.out { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .feed-dot.break { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .feed-name { font-weight: 600; color: var(--text); flex: 1; }
    .feed-action { color: var(--text-muted); font-size: 12px; }
    .feed-time   { color: var(--text-muted); font-size: 12px; font-family: 'Courier New', monospace; }

    /* ── Status overlay ── */
    #status-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #status-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    #status-overlay.waiting { background: rgba(24,24,27,0.92); }
    #status-overlay.success { background: rgba(10,60,25,0.93); }
    #status-overlay.error   { background: rgba(80,10,10,0.93); }

    #status-icon {
      font-size: 90px;
      line-height: 1;
      animation: iconPop 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes iconPop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #status-text {
      font-size: clamp(18px, 3.5vw, 26px);
      font-weight: 700;
      text-align: center;
      padding: 0 32px;
      line-height: 1.3;
      color: var(--text);
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(57,255,106,0.2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Config modal ── */
    #config-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #config-modal.open { display: flex; }

    .modal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-title {
      font-size: 18px; font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-close {
      margin-left: auto;
      background: none; border: none;
      color: var(--text-muted); font-size: 22px;
      cursor: pointer; line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--dark);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px; color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(57,255,106,0.12);
    }

    .modal-btn {
      width: 100%; padding: 14px;
      border: none; border-radius: 11px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .modal-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .modal-btn:active:not(:disabled) { transform: translateY(0); }
    .modal-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .modal-btn.primary { background: var(--green); color: #111; }
    .modal-btn.secondary {
      background: var(--gray-dim);
      color: var(--text-muted);
      border: 1px solid var(--border);
      margin-top: 10px;
    }

    #modal-error {
      font-size: 13px; color: var(--red);
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: none;
    }
    #modal-success-msg {
      font-size: 13px; color: var(--green);
      background: rgba(57,255,106,0.08);
      border: 1px solid rgba(57,255,106,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: none;
    }

    /* ── No WebAuthn fallback ── */
    #no-webauthn-banner {
      display: none;
      margin: 0 24px 12px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.35);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--amber);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      #header { padding: 10px 16px 8px; }
      #clock-section { padding: 12px 16px 10px; }
      #buttons-section { padding: 0 16px; gap: 10px; }
      .action-btn { min-height: 110px; }
      #btn-break, #btn-config { min-height: 72px; }
      #feed-section { padding: 10px 16px 12px; }
    }

    @media (min-width: 900px) {
      .action-btn { min-height: 180px; }
      #btn-break, #btn-config { min-height: 110px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div id="header">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div>
        <div class="brand-name">MESIO</div>
        <div class="brand-sub">Reloj de Personal</div>
      </div>
    </div>
    <div id="webauthn-badge">Biométrico activo</div>
  </div>

  <!-- Clock -->
  <div id="clock-section" onclick="toggleFullscreen()" title="Toca para pantalla completa">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date">Cargando...</div>
  </div>

  <!-- No WebAuthn banner -->
  <div id="no-webauthn-banner">
    Este dispositivo no soporta autenticación biométrica. Usa un navegador moderno con HTTPS.
  </div>

  <!-- Action buttons -->
  <div id="buttons-section">
    <button class="action-btn" id="btn-entrada" onclick="clockAction('clock_in')">
      <span class="btn-icon">👆</span>
      <span class="btn-label">Entrada</span>
    </button>
    <button class="action-btn" id="btn-salida" onclick="clockAction('clock_out')">
      <span class="btn-icon">👋</span>
      <span class="btn-label">Salida</span>
    </button>
    <button class="action-btn" id="btn-break" onclick="toggleBreak()">
      <span class="btn-icon">☕</span>
      <span class="btn-label">Break</span>
    </button>
    <button class="action-btn" id="btn-config" onclick="openConfig()">
      <span class="btn-icon">⚙️</span>
      <span class="btn-label">Config</span>
    </button>
  </div>

  <!-- Activity feed -->
  <div id="feed-section">
    <div id="feed-title">Últimas marcaciones</div>
    <ul id="feed-list">
      <li class="feed-item" style="justify-content:center;color:var(--text-muted);font-size:13px;">
        Cargando actividad...
      </li>
    </ul>
  </div>

</div>

<!-- Status overlay -->
<div id="status-overlay">
  <div id="status-icon"></div>
  <div id="status-text"></div>
</div>

<!-- Config / Registration modal -->
<div id="config-modal">
  <div class="modal-card">
    <div class="modal-title">
      <span>⚙️ Registrar huella</span>
      <button class="modal-close" onclick="closeConfig()" aria-label="Cerrar">&times;</button>
    </div>
    <div id="modal-error"></div>
    <div id="modal-success-msg"></div>
    <div id="config-form-view">
      <div class="field">
        <label>Nombre del empleado</label>
        <input type="text" id="reg-name" placeholder="Ej. Ana García" autocomplete="name">
      </div>
      <div class="field">
        <label>PIN (4–6 dígitos)</label>
        <input type="password" id="reg-pin" placeholder="••••" maxlength="6" inputmode="numeric" autocomplete="current-password">
      </div>
      <button class="modal-btn primary" id="reg-btn" onclick="registerBiometric()">
        Registrar huella / Face ID
      </button>
      <button class="modal-btn secondary" onclick="closeConfig()">Cancelar</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── Read restaurant_id from URL ── */
  const params = new URLSearchParams(location.search);
  const RID = params.get('r') || '';
  if (!RID) {
    document.getElementById('no-webauthn-banner').style.display = 'block';
    document.getElementById('no-webauthn-banner').textContent =
      'Falta el parámetro ?r= en la URL. Ejemplo: /reloj?r=123';
  }

  /* ── WebAuthn support check ── */
  const WEBAUTHN_OK = !!window.PublicKeyCredential;
  if (!WEBAUTHN_OK) {
    const badge = document.getElementById('webauthn-badge');
    badge.textContent = 'Sin biométrico';
    badge.classList.add('unsupported');
    document.getElementById('no-webauthn-banner').style.display = 'block';
    ['btn-entrada', 'btn-salida', 'btn-break'].forEach(id => {
      document.getElementById(id).disabled = true;
    });
  }

  /* ──────────────────────────────────────
     Clock
  ────────────────────────────────────── */
  const clockEl = document.getElementById('clock-time');
  const dateEl  = document.getElementById('clock-date');

  function tickClock() {
    const now = new Date();
    // Time
    const h  = String(now.getHours()).padStart(2, '0');
    const m  = String(now.getMinutes()).padStart(2, '0');
    const s  = String(now.getSeconds()).padStart(2, '0');
    clockEl.textContent = `${h}:${m}:${s}`;
    // Date in Spanish
    const dateStr = now.toLocaleDateString('es-CO', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
    // Capitalize first letter
    dateEl.textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
  }
  tickClock();
  setInterval(tickClock, 1000);

  /* ──────────────────────────────────────
     Fullscreen
  ────────────────────────────────────── */
  window.toggleFullscreen = function () {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  };

  /* ──────────────────────────────────────
     Status overlay
  ────────────────────────────────────── */
  const overlay   = document.getElementById('status-overlay');
  const statusIcon = document.getElementById('status-icon');
  const statusText = document.getElementById('status-text');

  function showStatus(type, message) {
    overlay.className = 'visible ' + type;
    statusText.textContent = message;
    if (type === 'waiting') {
      statusIcon.innerHTML = '<div class="spinner"></div>';
    } else if (type === 'success') {
      statusIcon.textContent = '✅';
    } else {
      statusIcon.textContent = '❌';
    }
  }

  function resetStatus() {
    overlay.className = '';
    overlay.style.opacity = '';
  }

  /* ──────────────────────────────────────
     WebAuthn helpers
  ────────────────────────────────────── */
  function _base64urlToBuffer(base64url) {
    const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
    const padded = base64 + '='.repeat((4 - base64.length % 4) % 4);
    const bin = atob(padded);
    return Uint8Array.from(bin, c => c.charCodeAt(0)).buffer;
  }

  function _bufferToBase64url(buffer) {
    const bytes = new Uint8Array(buffer);
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  /* ──────────────────────────────────────
     Clock action (Entrada / Salida)
  ────────────────────────────────────── */
  window.clockAction = async function (action) {
    if (!WEBAUTHN_OK) return;

    setButtonsDisabled(true);
    showStatus('waiting', 'Coloca tu huella o usa Face ID...');

    try {
      // 1. Get auth options
      const optResp = await fetch('/api/staff/webauthn/auth-options', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ restaurant_id: RID, action })
      });
      if (!optResp.ok) {
        const err = await optResp.json().catch(() => ({}));
        throw new Error(err.detail || 'Error del servidor al obtener opciones');
      }
      const options = await optResp.json();

      // 2. Biometric prompt
      const credential = await navigator.credentials.get({
        publicKey: {
          challenge: _base64urlToBuffer(options.challenge),
          rpId: options.rp_id,
          allowCredentials: (options.allow_credentials || []).map(c => ({
            id: _base64urlToBuffer(c.id),
            type: 'public-key',
            transports: c.transports || []
          })),
          timeout: 60000,
          userVerification: 'required'
        }
      });

      // 3. Send assertion
      const verifyResp = await fetch('/api/staff/webauthn/auth-complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action,
          restaurant_id: RID,
          credential_id:       _bufferToBase64url(credential.rawId),
          authenticator_data:  _bufferToBase64url(credential.response.authenticatorData),
          client_data_json:    _bufferToBase64url(credential.response.clientDataJSON),
          signature:           _bufferToBase64url(credential.response.signature)
        })
      });

      const result = await verifyResp.json();
      if (!verifyResp.ok) throw new Error(result.detail || 'Error de verificación');

      const label = action === 'clock_in' ? 'Entrada' : 'Salida';
      showStatus('success', `${result.staff_name}\n${label} registrada`);
      setTimeout(loadRecentActivity, 1000);

    } catch (e) {
      if (e.name === 'NotAllowedError') {
        showStatus('error', 'Autenticación cancelada o no disponible');
      } else {
        showStatus('error', e.message || 'Error de conexión');
      }
    }

    setTimeout(() => {
      resetStatus();
      setButtonsDisabled(false);
    }, 5000);
  };

  /* ──────────────────────────────────────
     Break toggle
  ────────────────────────────────────── */
  window.toggleBreak = async function () {
    if (!WEBAUTHN_OK) return;

    setButtonsDisabled(true);
    showStatus('waiting', 'Coloca tu huella para registrar break...');

    try {
      // Get auth options (reuse same endpoint, action = 'break')
      const optResp = await fetch('/api/staff/webauthn/auth-options', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ restaurant_id: RID, action: 'break' })
      });
      if (!optResp.ok) {
        const err = await optResp.json().catch(() => ({}));
        throw new Error(err.detail || 'Error del servidor');
      }
      const options = await optResp.json();

      const credential = await navigator.credentials.get({
        publicKey: {
          challenge: _base64urlToBuffer(options.challenge),
          rpId: options.rp_id,
          allowCredentials: (options.allow_credentials || []).map(c => ({
            id: _base64urlToBuffer(c.id),
            type: 'public-key',
            transports: c.transports || []
          })),
          timeout: 60000,
          userVerification: 'required'
        }
      });

      const assertion = {
        restaurant_id:       RID,
        credential_id:       _bufferToBase64url(credential.rawId),
        authenticator_data:  _bufferToBase64url(credential.response.authenticatorData),
        client_data_json:    _bufferToBase64url(credential.response.clientDataJSON),
        signature:           _bufferToBase64url(credential.response.signature)
      };

      // Try break-start; if 409 (already on break) try break-end
      let breakResp = await fetch('/api/staff/self/break-start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(assertion)
      });

      let breakLabel = 'Break iniciado';
      if (breakResp.status === 409) {
        breakResp = await fetch('/api/staff/self/break-end', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(assertion)
        });
        breakLabel = 'Break terminado';
      }

      const result = await breakResp.json();
      if (!breakResp.ok) throw new Error(result.detail || 'Error al registrar break');

      showStatus('success', `${result.staff_name || ''}\n${breakLabel}`);
      setTimeout(loadRecentActivity, 1000);

    } catch (e) {
      if (e.name === 'NotAllowedError') {
        showStatus('error', 'Autenticación cancelada');
      } else {
        showStatus('error', e.message || 'Error de conexión');
      }
    }

    setTimeout(() => {
      resetStatus();
      setButtonsDisabled(false);
    }, 5000);
  };

  /* ──────────────────────────────────────
     Registration (Config modal)
  ────────────────────────────────────── */
  window.openConfig = function () {
    document.getElementById('config-modal').classList.add('open');
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal-success-msg').style.display = 'none';
    document.getElementById('reg-name').value = '';
    document.getElementById('reg-pin').value = '';
    document.getElementById('reg-btn').disabled = false;
    document.getElementById('config-form-view').style.display = '';
  };

  window.closeConfig = function () {
    document.getElementById('config-modal').classList.remove('open');
  };

  function showModalError(msg) {
    const el = document.getElementById('modal-error');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('modal-success-msg').style.display = 'none';
  }

  function showModalSuccess(msg) {
    const el = document.getElementById('modal-success-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('modal-error').style.display = 'none';
  }

  window.registerBiometric = async function () {
    if (!WEBAUTHN_OK) {
      showModalError('Este dispositivo no soporta autenticación biométrica.');
      return;
    }

    const name = document.getElementById('reg-name').value.trim();
    const pin  = document.getElementById('reg-pin').value.trim();

    if (!name) { showModalError('Ingresa el nombre del empleado.'); return; }
    if (!/^\d{4,6}$/.test(pin)) { showModalError('El PIN debe tener entre 4 y 6 dígitos.'); return; }

    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    btn.textContent = 'Verificando PIN...';
    document.getElementById('modal-error').style.display = 'none';

    let token = '';
    try {
      // 1. PIN login to get token
      const loginResp = await fetch('/api/staff/pin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, pin, restaurant_id: RID })
      });
      const loginData = await loginResp.json();
      if (!loginResp.ok) throw new Error(loginData.detail || 'PIN o nombre incorrecto');
      token = loginData.access_token;

      btn.textContent = 'Iniciando biométrico...';

      // 2. Registration options
      const regOptResp = await fetch('/api/staff/webauthn/register-options', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ restaurant_id: RID })
      });
      const regOptions = await regOptResp.json();
      if (!regOptResp.ok) throw new Error(regOptions.detail || 'Error al obtener opciones de registro');

      // 3. Create credential
      const credential = await navigator.credentials.create({
        publicKey: {
          challenge:          _base64urlToBuffer(regOptions.challenge),
          rp:                 { id: regOptions.rp_id, name: regOptions.rp_name || 'Mesio' },
          user: {
            id:           _base64urlToBuffer(regOptions.user_id),
            name:         regOptions.user_name,
            displayName:  regOptions.user_display_name || regOptions.user_name
          },
          pubKeyCredParams:   regOptions.pub_key_cred_params || [{ type: 'public-key', alg: -7 }],
          authenticatorSelection: {
            userVerification: 'required',
            residentKey:      'preferred'
          },
          timeout:            60000,
          attestation:        'none'
        }
      });

      btn.textContent = 'Guardando...';

      // 4. Register complete
      const completeResp = await fetch('/api/staff/webauthn/register-complete', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          restaurant_id:    RID,
          credential_id:    _bufferToBase64url(credential.rawId),
          attestation_object: _bufferToBase64url(credential.response.attestationObject),
          client_data_json: _bufferToBase64url(credential.response.clientDataJSON)
        })
      });

      const completeData = await completeResp.json();
      if (!completeResp.ok) throw new Error(completeData.detail || 'Error al guardar huella');

      showModalSuccess(`¡Huella registrada para ${name}! Ya puede usar el reloj.`);
      btn.textContent = 'Registrar huella / Face ID';
      btn.disabled = false;

    } catch (e) {
      if (e.name === 'NotAllowedError') {
        showModalError('Registro cancelado o no permitido por el dispositivo.');
      } else {
        showModalError(e.message || 'Error inesperado');
      }
      btn.textContent = 'Registrar huella / Face ID';
      btn.disabled = false;
    }
  };

  /* ──────────────────────────────────────
     Live activity feed
  ────────────────────────────────────── */
  const feedList = document.getElementById('feed-list');

  const ACTION_LABELS = {
    clock_in:    'Entrada',
    clock_out:   'Salida',
    break_start: 'Break inicio',
    break_end:   'Break fin'
  };

  function formatTime(isoString) {
    if (!isoString) return '';
    try {
      const d = new Date(isoString);
      return d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
    } catch (_) { return isoString; }
  }

  function dotClass(action) {
    if (action === 'clock_in')    return 'in';
    if (action === 'clock_out')   return 'out';
    return 'break';
  }

  window.loadRecentActivity = async function () {
    if (!RID) return;
    try {
      const resp = await fetch(`/api/staff/open-shifts?restaurant_id=${encodeURIComponent(RID)}`);
      if (!resp.ok) return;
      const data = await resp.json();
      // data expected: array of { staff_name, action, created_at } or similar
      const shifts = Array.isArray(data) ? data : (data.shifts || data.entries || []);
      const recent = shifts.slice(0, 5);

      if (recent.length === 0) {
        feedList.innerHTML = '<li class="feed-item" style="justify-content:center;color:var(--text-muted);font-size:13px;">Sin marcaciones recientes</li>';
        return;
      }

      feedList.innerHTML = '';
      recent.forEach(entry => {
        const li = document.createElement('li');
        li.className = 'feed-item';

        const dot = document.createElement('span');
        dot.className = 'feed-dot ' + dotClass(entry.action || entry.type || 'clock_in');

        const nameSpan = document.createElement('span');
        nameSpan.className = 'feed-name';
        nameSpan.textContent = entry.staff_name || entry.name || 'Empleado';

        const actionSpan = document.createElement('span');
        actionSpan.className = 'feed-action';
        actionSpan.textContent = ACTION_LABELS[entry.action || entry.type] || (entry.action || '');

        const timeSpan = document.createElement('span');
        timeSpan.className = 'feed-time';
        timeSpan.textContent = formatTime(entry.clock_in || entry.created_at || entry.timestamp);

        li.appendChild(dot);
        li.appendChild(nameSpan);
        li.appendChild(actionSpan);
        li.appendChild(timeSpan);
        feedList.appendChild(li);
      });
    } catch (_) {
      // Silent fail — feed is non-critical
    }
  };

  // Poll every 10 seconds
  loadRecentActivity();
  setInterval(loadRecentActivity, 10000);

  /* ──────────────────────────────────────
     Helpers
  ────────────────────────────────────── */
  function setButtonsDisabled(disabled) {
    ['btn-entrada', 'btn-salida', 'btn-break'].forEach(id => {
      document.getElementById(id).disabled = disabled;
    });
  }

  // Close modal on backdrop click
  document.getElementById('config-modal').addEventListener('click', function (e) {
    if (e.target === this) closeConfig();
  });

  // Prevent body scroll bounce on iOS
  document.addEventListener('touchmove', function (e) {
    if (e.target === document.body) e.preventDefault();
  }, { passive: false });

})();
</script>
</body>
</html>
