<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menú del Restaurante</title>
<style>
  body, html { 
    margin: 0; 
    padding: 0; 
    height: 100%; 
    overflow: hidden; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
    background: #333; 
  }
  
  /* Contenedor del PDF ocupando todo el espacio excepto el footer */
  #pdf-container { 
    width: 100%; 
    height: calc(100% - 85px); 
    border: none; 
    background: #fff;
  }
  
  /* Footer fijo en la parte inferior */
  .footer { 
    position: fixed; 
    bottom: 0; left: 0; right: 0; 
    height: 85px; 
    background: #fff; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 -4px 15px rgba(0,0,0,0.1); 
    padding: 0 1.5rem; 
    z-index: 1000; 
  }
  
  /* Botón estilo WhatsApp */
  .btn-wa { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 10px; 
    background: #25D366; 
    color: #fff; 
    text-decoration: none; 
    padding: 14px 24px; 
    border-radius: 100px; 
    font-size: 17px; 
    font-weight: 600; 
    width: 100%; 
    max-width: 450px; 
    box-shadow: 0 4px 14px rgba(37,211,102,0.3); 
    transition: transform 0.2s; 
  }
  .btn-wa:active { transform: scale(0.96); }
</style>
</head>
<body>

<iframe id="pdf-container" src="/static/menu.pdf"></iframe>

<div class="footer">
  <a href="#" id="wa-btn" class="btn-wa">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a9 9 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
    Hacer pedido en WhatsApp
  </a>
</div>

<script>
async function init() {
  // Extrae el ID de la mesa desde la URL (ej. /menu/mesa-1)
  const tableId = window.location.pathname.split('/').pop();
  try {
    const res = await fetch(`/api/public/menu-context/${tableId}`);
    if (res.ok) {
      const data = await res.json();
      // Inyecta el link de WhatsApp específico de esta mesa
      document.getElementById('wa-btn').href = data.wa_url;
      document.title = `Menú - ${data.table_name}`;
    } else {
      console.error("No se encontró la mesa");
      alert("Mesa no encontrada. Verifica el código QR.");
    }
  } catch(e) {
    console.error("Error conectando con la base de datos", e);
  }
}
init();
</script>
</body>
</html>
