<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesio — Vista Mesero</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #111; }
.topbar { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #fff; border-bottom: 0.5px solid #e0e0d8; display: flex; align-items: center; padding: 0 1rem; gap: 12px; z-index: 100; }
.topbar-logo { width: 32px; height: 32px; background: #1D9E75; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
.topbar-role { font-size: 11px; padding: 3px 10px; background: #E1F5EE; color: #0F6E56; border-radius: 20px; font-weight: 500; }
.logout-btn { font-size: 12px; padding: 5px 10px; border: 0.5px solid #ddd; border-radius: 8px; background: none; cursor: pointer; color: #555; }
.tabs { position: fixed; top: 56px; left: 0; right: 0; background: #fff; border-bottom: 0.5px solid #e0e0d8; display: flex; z-index: 90; }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
.tab.active { color: #1D9E75; border-bottom-color: #1D9E75; }
.tab-badge { display: inline-block; background: #E24B4A; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 4px; vertical-align: middle; }
.tab-badge-warn { background: #E8A020; }
.content { margin-top: 104px; padding: 1rem; }
.section { display: none; }
.section.active { display: block; }

/* ── ALERT CARDS ── */
.alert-card { border-radius: 14px; padding: 1rem 1.1rem; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); animation: slideIn .3s ease; position: relative; }
@keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.alert-bill   { background: #FFF8E6; border: 1.5px solid #F0A500; border-left: 5px solid #F0A500; }
.alert-waiter { background: #EBF4FF; border: 1.5px solid #2D7DD2; border-left: 5px solid #2D7DD2; }
.alert-admin  { background: #EEF2FF; border: 1.5px solid #6366F1; border-left: 5px solid #6366F1; }
.alert-icon { font-size: 1.8rem; flex-shrink: 0; line-height: 1; }
.alert-body { flex: 1; min-width: 0; }
.alert-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.alert-title-bill   { color: #7A4F00; }
.alert-title-waiter { color: #174A80; }
.alert-title-admin  { color: #3730A3; }
.alert-meta { font-size: 12px; color: #888; margin-bottom: 6px; }
.alert-msg  { font-size: 13px; color: #444; }
.alert-dismiss { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 18px; color: #bbb; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 6px; }
.alert-dismiss:hover { color: #555; background: rgba(0,0,0,.06); }
.alert-time { font-size: 11px; color: #aaa; white-space: nowrap; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #1D2226; color: #fff; padding: 12px 20px; border-radius: 50px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.25); transition: transform .35s cubic-bezier(.34,1.56,.64,1); z-index: 9999; max-width: 90vw; text-align: center; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast-icon { font-size: 1.3rem; flex-shrink: 0; }
.toast-bill   { border-left: 4px solid #F0A500; }
.toast-waiter { border-left: 4px solid #2D7DD2; }
.toast-admin  { border-left: 4px solid #6366F1; }

/* ── ORDER CARDS ── */
.order-card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1rem; margin-bottom: 10px; }
.order-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.order-id { font-size: 13px; font-weight: 600; }
.order-time { font-size: 11px; color: #888; }
.order-items { font-size: 13px; color: #444; margin-bottom: 10px; line-height: 1.6; }
.order-status { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
.st-listo     { background: #E1F5EE; color: #0F6E56; }
.st-recibido  { background: #FFF3CD; color: #856404; }
.st-prep      { background: #E6F1FB; color: #185FA5; }
.st-entregado { background: #f0f0e8; color: #888; }
.st-factura   { background: #F0E6FF; color: #6B21A8; }
.btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; }
.btn-green  { background: #1D9E75; color: #fff; }
.btn-purple { background: #7C3AED; color: #fff; }

/* ── CHAT ── */
.conv-item { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1rem; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
.conv-avatar { width: 40px; height: 40px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #0F6E56; flex-shrink: 0; text-transform: uppercase; }
.conv-phone { font-size: 13px; font-weight: 600; }
.conv-preview { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-count { font-size: 11px; color: #aaa; flex-shrink: 0; }
.empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }

/* ── CHAT MODAL ── */
.chat-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 2000; align-items: center; justify-content: center; }
.chat-modal.open { display: flex; }
.chat-box { background: #fff; border-radius: 16px; width: 520px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
.chat-head { padding: 1rem 1.25rem; border-bottom: 0.5px solid #e0e0d8; display: flex; align-items: center; justify-content: space-between; background: #f8f8f5; }
.chat-phone { font-size: 14px; font-weight: 600; }
.chat-close { font-size: 20px; background: none; border: none; cursor: pointer; color: #aaa; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 8px; background: #ECE5DD; min-height: 250px; }
.msg { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; max-width: 75%; }
.msg-user { background: #DCF8C6; align-self: flex-end; border-bottom-right-radius: 3px; }
.msg-bot  { background: #fff; align-self: flex-start; border-bottom-left-radius: 3px; }
.chat-input-row { padding: .75rem 1rem; border-top: 0.5px solid #e0e0d8; display: flex; gap: 8px; background: #f8f8f5; }
.chat-input-row input { flex: 1; padding: 8px 12px; border: 1px solid #e0e0d8; border-radius: 20px; font-size: 13px; outline: none; }
.chat-input-row button { background: #1D9E75; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; }

.section-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; margin-top: 4px; }
.sh-listo  { color: #0F6E56; }
.sh-orders { color: #185FA5; }

/* Botón de limpiar chat */
.btn-delete-chat { background: none; border: none; color: #E24B4A; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.btn-delete-chat:hover { opacity: 0.7; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">M</div>
  <div class="topbar-title" id="rest-name">Mi Restaurante</div>
  <div class="topbar-role">Mesero</div>
  <button class="logout-btn" onclick="doLogout()">Salir</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-alertas" onclick="switchTab('alertas',this)">
    🔔 Alertas
    <span class="tab-badge tab-badge-warn" id="badge-alertas" style="display:none">0</span>
  </div>
  <div class="tab" id="tab-pedidos" onclick="switchTab('pedidos',this)">
    Pedidos listos
    <span class="tab-badge" id="badge-pedidos" style="display:none">0</span>
  </div>
  <div class="tab" id="tab-chats" onclick="switchTab('chats',this)">
    WhatsApp
    <span class="tab-badge" id="badge-chats" style="display:none">0</span>
  </div>
</div>

<div class="content">
  <div id="alertas" class="section active">
    <div id="alerts-list"><div class="empty">Sin alertas activas. Cuando un cliente pida la cuenta o llame al mesero, aparecerá aquí.</div></div>
  </div>
  <div id="pedidos" class="section">
    <div id="orders-list"><div class="empty">Cargando pedidos...</div></div>
  </div>
  <div id="chats" class="section">
    <div id="chats-list"><div class="empty">Cargando conversaciones...</div></div>
  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">🔔</span>
  <span id="toast-text">Nueva alerta</span>
</div>

<div class="chat-modal" id="chat-modal">
  <div class="chat-box">
    <div class="chat-head">
      <div class="chat-phone" id="chat-phone"></div>
      <div style="display:flex; gap:12px; align-items:center;">
        <button class="btn-delete-chat" onclick="deleteCurrentChat()">🗑️ Limpiar</button>
        <button class="chat-close" onclick="closeChat()">✕</button>
      </div>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input-row">
      <input id="chat-input-msg" placeholder="Responder manualmente..." onkeydown="if(event.key==='Enter')sendReply()">
      <button onclick="sendReply()">Enviar</button>
    </div>
  </div>
</div>

<script>
const token      = localStorage.getItem('rb_token');
const restaurant = JSON.parse(localStorage.getItem('rb_restaurant') || '{}');
if (!token) window.location.href = '/login';
const headers = { 'Authorization': 'Bearer ' + token };
document.getElementById('rest-name').textContent = restaurant.name || 'Mi Restaurante';

let currentChatPhone = null;
let phoneToTableMap = {}; // Mapa para enmascarar números privados

function getDisplayName(phone) {
  if (phoneToTableMap[phone]) return phoneToTableMap[phone];
  return "Cliente " + phone.substring(0, 4) + "***" + phone.slice(-2);
}

function doLogout() {
  localStorage.removeItem('rb_token');
  localStorage.removeItem('rb_restaurant');
  window.location.href = '/login';
}

function switchTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ── SOUND ─────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new AudioCtx();
  return _audioCtx;
}
function playAlertSound(type) {
  try {
    const ctx  = getAudioCtx();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    const freqs = type === 'bill' ? [880, 660] : type === 'admin_alert' ? [660, 770, 880] : [440, 550, 660];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.18);
      osc.connect(gain);
      osc.start(ctx.currentTime + i * 0.18);
      osc.stop(ctx.currentTime + i * 0.18 + 0.15);
    });
  } catch(e) {}
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(text, type) {
  const t  = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = type === 'bill' ? '💳' : type === 'admin_alert' ? '🛡️' : '🙋';
  document.getElementById('toast-text').textContent  = text;
  t.className = 'toast show toast-' + (type === 'admin_alert' ? 'admin' : type);
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
}

// ── ALERTS ────────────────────────────────────────────────────────
let knownAlertIds = new Set();

function timeAgo(isoStr) {
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 60)   return 'hace ' + diff + 's';
  if (diff < 3600) return 'hace ' + Math.floor(diff/60) + 'min';
  return 'hace ' + Math.floor(diff/3600) + 'h';
}

async function loadAlerts() {
  try {
    const r = await fetch('/api/waiter-alerts', { headers });
    if (!r.ok) return;
    const { alerts = [] } = await r.json();

    alerts.forEach(a => {
      if (a.phone && a.table_name) phoneToTableMap[a.phone] = a.table_name;
      
      if (!knownAlertIds.has(a.id)) {
        knownAlertIds.add(a.id);
        playAlertSound(a.alert_type);
        let label = '';
        if (a.alert_type === 'bill')        label = '💳 ' + (a.table_name||'Cliente') + ' pide la cuenta';
        else if (a.alert_type === 'admin_alert') label = '🛡️ Admin: ' + (a.table_name||'') + ' — ' + (a.message||'atención requerida');
        else                                label = '🙋 ' + (a.table_name||'Cliente') + ' llama al mesero';
        showToast(label, a.alert_type);
      }
    });

    const badge = document.getElementById('badge-alertas');
    badge.textContent = alerts.length;
    badge.style.display = alerts.length > 0 ? 'inline-block' : 'none';

    const container = document.getElementById('alerts-list');
    if (!alerts.length) {
      container.innerHTML = '<div class="empty">Sin alertas activas. Cuando un cliente pida la cuenta o llame al mesero, aparecerá aquí.</div>';
      return;
    }

    container.innerHTML = alerts.map(a => {
      const isAdmin  = a.alert_type === 'admin_alert';
      const isBill   = a.alert_type === 'bill';
      const cardClass  = isAdmin ? 'alert-admin'  : isBill ? 'alert-bill'  : 'alert-waiter';
      const titleClass = isAdmin ? 'alert-title-admin' : isBill ? 'alert-title-bill' : 'alert-title-waiter';
      const icon  = isAdmin ? '🛡️' : isBill ? '💳' : '🙋';
      const title = isAdmin
        ? 'Alerta del Administrador' + (a.table_name ? ' — ' + a.table_name : '')
        : isBill
          ? 'Solicitud de cuenta' + (a.table_name ? ' — ' + a.table_name : '')
          : 'Llamada al mesero' + (a.table_name ? ' — ' + a.table_name : '');

      const reopenBtn = isAdmin
        ? `<button class="btn-reopen-alert" onclick="reopenSessionFromAlert('${a.phone}','${a.bot_number}',${a.id})">♻️ Reabrir sesión del cliente</button>`
        : '';

      return `<div class="alert-card ${cardClass}" id="alert-${a.id}">
        <div class="alert-icon">${icon}</div>
        <div class="alert-body">
          <div class="alert-title ${titleClass}">${title}</div>
          <div class="alert-meta">${a.phone} · <span class="alert-time">${timeAgo(a.created_at)}</span></div>
          ${a.message ? '<div class="alert-msg">' + a.message + '</div>' : ''}
          ${reopenBtn}
        </div>
        <button class="alert-dismiss" onclick="dismissAlert(${a.id})">✕</button>
      </div>`;
    }).join('');
  } catch(e) { console.error('loadAlerts:', e); }
}

async function dismissAlert(id) {
  const el = document.getElementById('alert-' + id);
  if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(30px)'; el.style.transition = 'all .25s'; }
  setTimeout(async () => {
    try {
      await fetch('/api/waiter-alerts/' + id + '/dismiss', { method: 'POST', headers });
      knownAlertIds.delete(id);
      loadAlerts();
    } catch(e) {}
  }, 250);
}

// ── ORDERS ────────────────────────────────────────────────────────
function statusLabel(s) {
  return {
    recibido:'Recibido', en_preparacion:'En preparación', listo:'Listo para servir',
    entregado:'Entregado', factura_entregada:'Factura entregada', pendiente_pago:'Pendiente pago'
  }[s] || s;
}
function statusClass(s) {
  if (s === 'listo')             return 'st-listo';
  if (s === 'en_preparacion')    return 'st-prep';
  if (s === 'entregado')         return 'st-entregado';
  if (s === 'factura_entregada') return 'st-factura';
  return 'st-recibido';
}

async function loadOrders() {
  try {
    const [r1, r2] = await Promise.all([
      fetch('/api/table-orders', { headers }),
      fetch('/api/dashboard/orders?period=today', { headers })
    ]);
    const allTableOrders = r1.ok ? (await r1.json()).orders || [] : [];
    const regularOrders  = r2.ok ? (await r2.json()).orders || [] : [];

    allTableOrders.forEach(o => {
      if (o.phone && o.table_name) phoneToTableMap[o.phone] = o.table_name;
    });

    const listoTable     = allTableOrders.filter(o => o.status === 'listo');
    const entregadoTable = allTableOrders.filter(o => o.status === 'entregado' || o.status === 'factura_generada');
    const pendingRegular = regularOrders.filter(o => o.status !== 'entregado' && o.status !== 'cancelado');

    const billsMap = {};
    entregadoTable.forEach(o => {
        const baseId = o.id.replace(/-\d+$/, '');
        if (!billsMap[baseId]) {
            billsMap[baseId] = { id: baseId, table_name: o.table_name, created_at: o.created_at, status: o.status, items: [], total: 0 };
        }
        if (o.status === 'factura_generada') billsMap[baseId].status = 'factura_generada';
        let parsedItems = [];
        try {
            const arr = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
            parsedItems = Array.isArray(arr) ? arr : [];
        } catch(e) {}
        
        billsMap[baseId].items.push(...parsedItems);
        billsMap[baseId].total += (Number(o.total) || 0);
    });
    const groupedBills = Object.values(billsMap);

    const total = listoTable.length + groupedBills.length + pendingRegular.length;
    const badge = document.getElementById('badge-pedidos');
    badge.textContent = total;
    badge.style.display = total > 0 ? 'inline-block' : 'none';

    let html = '';

    if (listoTable.length > 0) {
      html += '<div class="section-header sh-listo">✅ Listos para servir</div>';
      listoTable.forEach(o => {
        const items = Array.isArray(o.items) ? o.items.map(i => (i.quantity||1)+'x '+i.name).join(', ') : o.items || '';
        const total_fmt = '$' + Number(o.total||0).toLocaleString('es-CO');
        html += `<div class="order-card" style="border-left:3px solid #1D9E75;">
          <div class="order-header">
            <div class="order-id">${o.table_name}</div>
            <div class="order-time">${(o.created_at||'').substring(11,16)}</div>
          </div>
          <div class="order-items">${items}</div>
          <div style="font-size:12px;color:#0F6E56;font-weight:600;margin-bottom:8px;">Total: ${total_fmt}</div>
          <div><button class="btn btn-green" onclick="updateTableOrder('${o.id}','entregado')">🍽️ Marcar entregado</button></div>
        </div>`;
      });
    }

    if (groupedBills.length > 0) {
      html += '<div class="section-header" style="color:#7C3AED;margin-top:12px;">🧾 Pendientes de Cierre</div>';
      groupedBills.forEach(b => {
        const itemsJoined = b.items.map(i => (i.quantity||1)+'x '+i.name).join(', ');
        const total_fmt = '$' + Number(b.total||0).toLocaleString('es-CO');
        const isGenerated = b.status === 'factura_generada';
        
        const actionBtns = isGenerated 
            ? `<div style="font-size:11px; color:#1D9E75; font-weight:600; margin-bottom:6px;">✅ Factura enviada al sistema contable</div>
               <button class="btn" style="background:#555; color:#fff; width:100%;" onclick="updateTableOrder('${b.id}','cerrar_mesa')">👋 Cerrar Mesa y Despedir</button>`
            : `<div style="display:flex; gap:6px;">
                 <button class="btn btn-purple" onclick="updateTableOrder('${b.id}','generar_factura')" style="flex:1;">🧾 Generar Factura</button>
                 <button class="btn" style="background:#555; color:#fff; flex:1;" onclick="updateTableOrder('${b.id}','cerrar_mesa')">👋 Solo Cerrar</button>
               </div>`;

        html += `<div class="order-card" style="border-left:3px solid #7C3AED;">
          <div class="order-header">
            <div class="order-id">${b.table_name}</div>
            <div class="order-time">${(b.created_at||'').substring(11,16)}</div>
          </div>
          <div class="order-items">${itemsJoined}</div>
          <div style="font-size:13px;font-weight:700;color:#7C3AED;margin-bottom:10px;">Total: ${total_fmt}</div>
          ${actionBtns}
        </div>`;
      });
    }

    if (pendingRegular.length > 0) {
      html += '<div class="section-header sh-orders" style="margin-top:12px;color:#185FA5;">📱 Pedidos WhatsApp hoy</div>';
      pendingRegular.forEach(o => {
        html += `<div class="order-card">
          <div class="order-header"><div class="order-id">${o.id.substring(0,12)}</div><div class="order-time">${o.time}</div></div>
          <div class="order-items">${o.items}</div>
          <div><span class="order-status ${statusClass(o.status)}">${statusLabel(o.status)}</span></div>
          ${o.address ? '<div style="font-size:12px;color:#888;margin-bottom:8px;">'+o.address+'</div>' : ''}
        </div>`;
      });
    }

    if (!html) html = '<div class="empty">Sin pedidos activos ahora mismo</div>';
    document.getElementById('orders-list').innerHTML = html;
  } catch(e) { console.error('loadOrders:', e); }
}

async function updateTableOrder(id, status) {
  try {
    await fetch('/api/table-orders/' + id + '/status', {
      method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    loadOrders();
  } catch(e) {}
}

// ── CHATS ─────────────────────────────────────────────────────────
async function loadChats() {
  try {
    const r = await fetch('/api/dashboard/conversations', { headers });
    if (!r.ok) return;
    const { conversations = [] } = await r.json();
    const badge = document.getElementById('badge-chats');
    badge.textContent = conversations.length;
    badge.style.display = conversations.length > 0 ? 'inline-block' : 'none';
    if (!conversations.length) {
      document.getElementById('chats-list').innerHTML = '<div class="empty">Sin conversaciones activas</div>';
      return;
    }
    
    document.getElementById('chats-list').innerHTML = conversations.map(c => {
      const dName = getDisplayName(c.phone);
      return `
      <div class="conv-item" onclick="openChat('${c.phone}')">
        <div class="conv-avatar">${dName.slice(0, 2).toUpperCase()}</div>
        <div style="flex:1;min-width:0;">
          <div class="conv-phone">${dName}</div>
          <div class="conv-preview">${c.preview}</div>
        </div>
        <div class="conv-count">${c.messages} msgs</div>
      </div>`;
    }).join('');
  } catch(e) { console.error('loadChats:', e); }
}

async function openChat(phone) {
  currentChatPhone = phone;
  document.getElementById('chat-phone').textContent = getDisplayName(phone);
  document.getElementById('chat-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  try {
    const r = await fetch('/api/conversations/' + encodeURIComponent(phone), { headers });
    if (!r.ok) return;
    const { history = [] } = await r.json();
    const container = document.getElementById('chat-msgs');
    container.innerHTML = history.map(m => `
      <div class="msg ${m.role === 'user' ? 'msg-user' : 'msg-bot'}">${typeof m.content === 'string' ? m.content : JSON.stringify(m.content)}</div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  } catch(e) {}
}

function closeChat() {
  document.getElementById('chat-modal').classList.remove('open');
  document.body.style.overflow = '';
  currentChatPhone = null;
}

// BOTÓN PARA LIMPIAR CONVERSACIONES ATASCADAS (MANUAL)
async function deleteCurrentChat() {
  if (!currentChatPhone) return;
  if (!confirm('¿Seguro que deseas eliminar esta conversación? Esto limpiará la memoria del bot y cancelará cualquier pedido en curso para esta mesa.')) return;
  
  try {
    const r = await fetch('/api/conversations/' + encodeURIComponent(currentChatPhone), {
      method: 'DELETE',
      headers: headers
    });
    if (r.ok) {
      closeChat();
      loadChats();
      showToast('Conversación eliminada correctamente.', 'admin_alert');
    } else {
      alert('Error al intentar limpiar el chat.');
    }
  } catch (e) {
    console.error(e);
    alert('Error de conexión.');
  }
}

async function sendReply() {
  const input = document.getElementById('chat-input-msg');
  const msg   = input.value.trim();
  if (!msg || !currentChatPhone) return;
  input.value = '';
  try {
    await fetch('/api/conversations/' + encodeURIComponent(currentChatPhone) + '/reply', {
      method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    openChat(currentChatPhone);
  } catch(e) {}
}

// ── POLLING ───────────────────────────────────────────────────────
loadAlerts();
loadOrders();
loadChats();
setInterval(loadAlerts,  5000);
setInterval(loadOrders, 15000);
setInterval(loadChats,  15000);
</script>
